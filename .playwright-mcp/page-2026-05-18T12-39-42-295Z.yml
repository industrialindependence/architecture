      - generic [ref=e235]:
        - paragraph [ref=e236]: § A l'interieur de la passerelle
        - paragraph [ref=e237]:
          - text: "La passerelle est partitionnee en interne en quatre cotes :"
          - strong [ref=e238]: entrant
          - text: (cote ACS), une
          - strong [ref=e239]: DMZ interne
          - text: ","
          - strong [ref=e240]: sortant
