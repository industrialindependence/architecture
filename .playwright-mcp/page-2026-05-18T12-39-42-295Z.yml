        - paragraph [ref=e242]:
          - text: Le
          - strong [ref=e243]: lac de donnees local
          - text: vit dans la DMZ. Tout ce que la passerelle capture, classe ou audite y atterrit. Le bus en vol qui relie les roles ne perdure rien ; il transporte les messages entre conteneurs vivants et les oublie. Le lac est la source de verite sur la passerelle. Les publicateurs sortants lisent depuis le lac. Une passerelle deconnectee de l'amont continue d'enregistrer, continue de repondre aux requetes locales, continue d'attester. Quand l'amont revient, elle siphonne.
