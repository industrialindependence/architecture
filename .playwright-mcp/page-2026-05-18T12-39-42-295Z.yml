      - generic [ref=e329]:
        - paragraph [ref=e330]: § Chaque conversation a un contrat
        - paragraph [ref=e331]:
          - text: Toute communication sur la passerelle et a travers ses frontieres est regie par un
          - strong [ref=e332]: contrat de donnees
          - text: "explicite : ce qui circule, sous quelle forme, avec quelle authentification, sous quel SLA, avec quelle matrice RACI pour chaque mode de defaillance. L'ensemble complet est le"
          - strong [ref=e333]: catalogue de contrats
          - text: ", versionne et decouvrable."
        - paragraph [ref=e334]:
          - text: La communication sans contrat est
          - emphasis [ref=e335]: empechee
          - text: la ou l'architecture peut imposer la prevention — pas d'entree au catalogue, pas d'identite SPIFFE emise, pas de mTLS, pas de trafic — et
          - emphasis [ref=e336]: signalee
          - text: la ou elle ne le peut pas, ce qui concerne surtout les cas d'observation passive en bordure. L'absence de contrat a un quelconque niveau est un defaut de deploiement, pas un etat tolere.
        - paragraph [ref=e337]:
          - text: Les contrats de frontiere sont
          - strong [ref=e338]: bilateraux
          - text: . L'ACS s'engage a produire la donnee conforme au cahier des charges. L'amont s'engage sur la connectivite, l'authentification, l'accuse de reception, le temps de reponse, la capacite et la reponse a incident. Chaque contrat nomme une matrice RACI pour chaque mode de defaillance et emet une telemetrie d'adherence — recus de qui a tenu quel cote.
      - generic [ref=e339]:
        - paragraph [ref=e340]: "§ Attestation : savoir si la prevention fonctionne"
        - paragraph [ref=e341]:
          - text: La prevention sans attestation est une histoire qu'on se raconte. La passerelle execute des observateurs independants qui verifient en croise si la prevention fonctionne reellement. Un observateur d'intrusion compare le trafic observe au catalogue de contrats et signale tout ce que le catalogue n'autorise pas — y compris le trafic attendu qui n'apparait pas. La ou le deploiement dispose d'un plan reseau programmable, les conduits n'existent sur le fil que la ou le catalogue le dit. Un
          - strong [ref=e342]: maitre E/S
          - text: observe le substrat E/S physique depuis un chemin separe et croise la capture primaire de la passerelle ; l'independance du chemin d'observation est la propriete porteuse. Tous les resultats d'attestation rejoignent la chaine d'audit a la severite d'evenement de securite.
        - paragraph [ref=e343]:
          - text: "C'est la reponse stable de l'architecture a la question :"
          - emphasis [ref=e344]: comment savez-vous que la prevention fonctionne reellement ?
          - text: Trois observateurs, independants des choses qu'ils observent, emettant sur la meme chaine d'audit que les evenements qu'ils croisent.
      - generic [ref=e345]:
        - paragraph [ref=e346]: § La configuration est un artefact signe
        - paragraph [ref=e347]: "La passerelle accepte la configuration uniquement comme un artefact texte signe consomme par un parseur. Meme motif pour les images de conteneur, le systeme d'exploitation et les jeux de regles. Il n'y a pas de point de terminaison REST qui mute l'etat en cours d'execution. L'interface de gestion optionnelle est un generateur de texte sans acces privilegie ; le parseur est la frontiere de confiance ; l'applicateur s'execute apres verification et validation, puis sort. Chaque transition d'etat est reconstructible depuis la chaine d'audit : hash d'artefact → validation du parseur → appels de l'applicateur → etat avant/apres."
        - paragraph [ref=e348]: Les mises a jour sont fractales elles aussi. Chaque passerelle a une portee plus large publie un manifeste d'etat voulu pour ses enfants. Les enfants tirent, reconcilient vers l'etat declare, rapportent ce qu'ils executent. Les exploitants autorisent des mises a jour specifiques pour des passerelles specifiques dans des fenetres specifiques via des artefacts d'approbation signes. Les deploiements graduels (canary, par zone, par usine) sont une politique exprimee par les approbations qui sont emises. Les passerelles deconnectees convergent quand elles se reconnectent, au rythme de l'exploitant.
      - generic [ref=e349]:
        - paragraph [ref=e350]: § Ce que cela donne
        - paragraph [ref=e351]: Un fournisseur qui quitte le marche n'echoue pas l'usine. La passerelle a son propre historien et sa propre identite. Il n'y a pas d'amont qui puisse tomber.
        - paragraph [ref=e352]: Une coupure cloud n'arrete pas la production. Le cloud est un abonne a la passerelle, pas l'inverse. Les operations locales restent locales.
        - paragraph [ref=e353]:
          - text: "Le deplacement lateral est borne par ce que le catalogue de contrats autorise et par ce que l'attestation peut voir. L'architecture repond a la question qu'on pose aux exploitants mais qu'ils ne peuvent autrement pas trancher :"
          - emphasis [ref=e354]: montrez-moi quels conduits existent, qui les a autorises, et comment vous savez qu'ils se comportent bien
          - text: .
        - paragraph [ref=e355]:
          - text: Les agents IA obtiennent un chemin propre, authentifie en mTLS, vers la surface de requete structuree de la passerelle. Le serveur Model Context Protocol qui expose la passerelle aux agents vit
          - strong [ref=e356]: hors boite
          - text: a une portee plus large, parce que le transport MCP entre en conflit avec la regle « pas de HTTP a la frontiere ». L'IA n'est pas une nouvelle surface d'attaque ; c'est un abonne lie par la meme grammaire de contrat que tout le reste.
        - paragraph [ref=e357]: La preuve de conformite est un sous-produit de l'exploitation. Le catalogue de contrats plus les flux d'attestation plus la chaine d'audit de la configuration signee constituent la preuve. Les exploitants publient ; les auditeurs lisent.
      - generic [ref=e358]:
        - paragraph [ref=e359]: § L'ordre
        - paragraph [ref=e360]:
          - strong [ref=e361]: Connecter d'abord. Modeliser ensuite. IA en troisieme.
        - paragraph [ref=e362]: Mettre les passerelles en place et faire couler les donnees de facon fiable. Modeliser les donnees — ISA-95 a L3, la colonne vertebrale de modelisation — a une portee plus large, la ou la modelisation a du sens. Confier les donnees modelisees a des agents IA via des serveurs MCP hors boite, a une portee plus large encore.
        - paragraph [ref=e363]: "La plupart des echecs dans cet espace sont des echecs d'ordre inverse : de l'IA sans modele, des modeles sans connexion fiable, de la connexion sans fondation souveraine. L'architecture refuse l'inversion."
