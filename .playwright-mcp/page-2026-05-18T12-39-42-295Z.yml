    - article [ref=e53]:
      - generic [ref=e54]:
        - paragraph [ref=e55]: § Les deux systemes
        - paragraph [ref=e56]: "Une usine, une raffinerie, une station de traitement des eaux, une centrale electrique — toutes sont faites de deux systemes cousus ensemble. Ils n'ont pas ete concus ensemble. Ils ont ete assembles, site par site, par des integrateurs payes projet par projet. Le resultat est ce dont herite chaque exploitant : une pile sur mesure, une emprise du fournisseur sur les donnees, et une reconstruction a chaque fois qu'un changement important devient necessaire."
        - paragraph [ref=e57]:
          - text: Le premier systeme est l'
          - strong [ref=e58]: Automation and Control Systems
          - text: "(ACS) : capteurs, automates, vannes, moteurs, interlocks de securite. Le travail est physique et les delais sont physiques. Une boucle de controle en retard de cent millisecondes est un probleme de securite, pas un probleme de latence. L'ACS est gouverne par"
          - strong [ref=e59]: SRP — Safety, Reliability, Performance
          - text: . Le vocabulaire est celui de la physique.
        - paragraph [ref=e60]:
          - text: Le second est l'
          - strong [ref=e61]: Information Technology
          - text: "(IT) : ordres, plannings, audits, tableaux de bord, modeles d'apprentissage automatique. Le travail consiste a tenir des enregistrements correctement et a les atteindre quand il le faut. L'IT est gouvernee par"
          - strong [ref=e62]: CIA — Confidentiality, Integrity, Availability
          - text: .
        - paragraph [ref=e63]: SRP et CIA ne sont pas deux ordres de priorite d'une meme liste. Ils decrivent des substrats differents. Utiliser CIA pour gouverner l'ACS est une erreur de categorie. L'habitude de trente ans qui consiste a traiter les systemes de controle comme « de l'IT avec un peu plus de disponibilite » est la source de la plupart des problemes que cette architecture existe pour resoudre.
      - generic [ref=e64]:
        - paragraph [ref=e65]: § Ou se trouve la frontiere
        - paragraph [ref=e66]: La frontiere IT/ACS n'est pas un schema reseau. C'est une frontiere de criticite des donnees. D'un cote, les donnees decrivent un etat physique qui existe maintenant et sur lequel on agit dans les millisecondes. De l'autre, les donnees sont un enregistrement de ce qui s'est deja passe. L'ACS transforme un etat physique en enregistrement en le capturant. L'IT transforme un enregistrement en action en emettant une instruction. La frontiere est l'endroit ou capture et instruction se rencontrent.
        - paragraph [ref=e67]:
          - text: "Cette frontiere a besoin de deux modeles de securite differents sur ses deux cotes. L'architecture les nomme comme le fait PERA+ :"
          - strong [ref=e68]: Zero Trust
          - text: cote IT,
          - strong [ref=e69]: Managed Trust
          - text: cote ACS. Cote IT, chaque connexion est authentifiee et autorisee independamment de son emplacement. Cote ACS, chaque equipement et chaque procede est connu, identifie et imputable au responsable operationnel. L'unite placee sur la frontiere termine le Zero Trust et commence le Managed Trust.
      - generic [ref=e70]:
        - paragraph [ref=e71]: § La passerelle de bordure securisee
        - paragraph [ref=e72]:
          - text: L'unite a un nom. C'est la
          - strong [ref=e73]: passerelle de bordure securisee
          - text: —
          - emphasis [ref=e74]: secure edge gateway
          - text: .
        - paragraph [ref=e75]: "La passerelle de bordure securisee se tient a la tete d'une zone. A l'interieur de la zone se trouve le systeme de controle dont l'exploitant a herite — PLC modernes, SCADA legacy, capteurs IoT, E/S grand public. A l'exterieur se trouve tout ce qui veut savoir ce qui se passe : une autre zone, une usine, un partenaire, un regulateur, le cloud, l'agent IA. La passerelle est ce que les deux cotes voient quand ils se regardent."
        - paragraph [ref=e76]: La passerelle fait quatre choses et refuse tout le reste.
        - paragraph [ref=e77]:
          - text: Elle
          - strong [ref=e78]: temoigne
          - text: ". Une derivation passive sur le reseau ACS. L'interface est en reception seule au niveau materiel : pas de pile IP, pas d'ecouteur, pas de transmission possible. Une compromission du role de temoin ne peut pas devenir une intrusion active sur le reseau de controle."
        - paragraph [ref=e79]:
          - text: Elle
          - strong [ref=e80]: interroge
          - text: . Certains equipements ne parlent que lorsqu'on les sollicite. La passerelle les interroge, avec une cadence bornee, une identite explicite, et une trace d'audit pour chaque requete.
        - paragraph [ref=e81]:
          - text: Elle
          - strong [ref=e82]: historise
          - text: . La passerelle exploite un magasin de series temporelles local. Captures, classifications, evenements et pistes d'audit y atterrissent. Le magasin local est la source de verite sur la passerelle ; les publicateurs sortants y puisent. Une passerelle deconnectee de tout amont reste pleinement fonctionnelle sur place.
        - paragraph [ref=e83]:
          - text: Elle
          - strong [ref=e84]: publie vers l'exterieur
          - text: ", de facon securisee. Une seule direction. Le profil de sortie est selectionnable par l'exploitant a chaque deploiement : OPC UA pub/sub, MQTT+Sparkplug B a la frontiere controleur↔broker de zone, une API de requete structuree sur mTLS, ou une ecriture batch vers un lac en aval. Il n'y a pas de defaut nomme. La passerelle publie ; l'aval s'abonne."
        - paragraph [ref=e85]: Ce que la passerelle refuse, c'est le reste. Pas de HTTP a la frontiere externe dans aucune direction. Pas de HTTP/HTTPS sortant. Pas de services actifs par defaut. Pas de canal de mutation en direct. L'interface de gestion locale optionnelle est en HTTPS, reservee au reseau local, sur un port physique distinct. Chaque ecouteur qui existe sur la passerelle existe parce que quelqu'un l'a concu et ingenie pour un usage operationnel specifique.
      - generic [ref=e86]:
        - paragraph [ref=e87]: § Une unite, deux realisations
        - paragraph [ref=e88]: L'architecture a deux realisations physiques. Le logiciel est le meme dans les deux.
        - paragraph [ref=e89]:
          - strong [ref=e90]: SL3
          - text: est le plancher. Une seule passerelle de bordure securisee, partitionnee en logiciel. Segmentation forte, TLS mutuel sur chaque conduit, identite de charge de travail, controle d'admission. Les canaux bidirectionnels existent la ou la conception en a besoin — l'ecouteur de l'API de requete structuree, le tunnel de publication sortant — et chacun est protege par pare-feu, identifie, enregistre. SL3 n'impose pas un flux physiquement unidirectionnel. SL3 est le
          - emphasis [ref=e91]: triptyque de prevention
          - text: — pare-feu noyau, identite de charge de travail, politique d'admission — soutenu par une attestation capable d'alerter quand le triptyque fuit.
        - paragraph [ref=e92]:
          - strong [ref=e93]: SL4
          - text: "est l'ideal. Deux passerelles et une diode de donnees materielle entre elles. La passerelle interne se tient cote ACS et execute temoin, interrogation, historien. Elle publie a travers la diode — les electrons circulent dans une seule direction au niveau physique — vers la passerelle externe cote IT. Les consommateurs atteignent la passerelle externe. La passerelle externe n'a aucun chemin de retour. SL4 est l'assertion la plus forte de l'architecture : pas « aucun chemin de retour n'a ete configure », mais « aucun chemin de retour ne peut exister »."
        - paragraph [ref=e94]:
          - text: IIA vise SL3 comme plancher et SL4 via diode comme ideal. La
          - emphasis [ref=e95]: two-box method
          - text: "que SL4 generalise est creditee : Rinaldi & Workman,"
          - emphasis [ref=e96]: The Everyman's Guide to EtherNet/IP Network Design
          - text: ", RTA 2022."
