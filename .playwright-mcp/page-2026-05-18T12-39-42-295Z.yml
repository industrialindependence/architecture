          - 'img "The Two-Box Method — SL3 vs SL4 Side-by-side comparison of SL3 and SL4 deployment modes. SL3 (left): a single IIA box at the boundary, software-only segmentation, passive ACS NIC, bidirectional channels firewalled and authenticated. SL4 (right): two IIA boxes with a hardware data diode between them — fiber TX-only in one direction, fiber RX-only in the other, physically enforced unidirectional flow. The software architecture is identical in both modes; only the physical topology changes." [ref=e99]':
