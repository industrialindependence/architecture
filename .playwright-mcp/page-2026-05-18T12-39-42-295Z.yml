          - text: architecture.
        - paragraph [ref=e33]:
          - text: Un site industriel fait tourner deux systemes cousus ensemble. L'un deplace le monde physique. L'autre l'enregistre. Industrial Independence Architecture est l'unite qui se tient la ou les deux se rencontrent — la
          - strong [ref=e34]: passerelle de bordure securisee
          - text: — et la regle qui en place une a la tete de chaque zone.
        - paragraph [ref=e35]: La passerelle fonctionne sans connectivite amont. Pas de cloud. Pas de reseau corporate. Pas d'internet. Si la connectivite existe, elle se compose vers le haut. Si elle tombe, rien ne change sur site.
