      - generic [ref=e160]:
        - paragraph [ref=e161]: § Le fractal
        - paragraph [ref=e162]: Un site industriel est organise en zones. Une boucle de controle tourne dans une cellule. Les cellules s'agregent en ligne. Les lignes en aire. Les aires en usine. Les usines en region. Les regions en fonction corporate.
        - paragraph [ref=e163]:
          - text: L'architecture place une passerelle de bordure securisee a la tete de chaque zone. La passerelle est identique a chaque zone. Le logiciel est le meme ; le partitionnement est le meme ; les regles de frontiere sont les memes. Seule la
          - emphasis [ref=e164]: portee
          - text: change. Une passerelle dans une cellule voit une machine. Une passerelle dans une usine voit l'usine. Une passerelle au niveau corporate voit la flotte. Meme architecture, ouverture differente.
        - paragraph [ref=e165]: "Le bas du fractal est strictement un-pour-un : chaque ACS recoit sa propre passerelle. L'agregation — plusieurs-vers-un — commence au-dessus de L2. Le haut ne s'effondre pas : un historien central est une passerelle a portee plus large, pas un autre type de systeme. Le cloud est un abonne, pas un pair."
        - paragraph [ref=e166]:
          - text: Chaque passerelle est
          - strong [ref=e167]: souveraine
          - text: . Elle possede son identite, son historien, sa chaine d'audit. Elle ne depend de rien en amont pour continuer a fonctionner. Si la connexion corporate tombe, la passerelle de l'usine va bien. Si l'usine tombe, la passerelle de l'aire va bien. Si un fournisseur sort du marche, la passerelle, elle, reste.
        - paragraph [ref=e168]: La souverainete n'est pas l'isolement. Les passerelles a des portees adjacentes se connaissent ; elles ont des contrats de donnees entre elles ; elles echangent de l'information sur des conduits mTLS. La contrainte n'est pas « invisible ». La contrainte est « aucune dependance ». La conscience est autorisee. La dependance ne l'est pas.
        - paragraph [ref=e169]:
          - text: L'architecture est
          - strong [ref=e170]: distribuee
          - text: ", pas federee. Un seul exploitant exploite le maillage. Le fractal n'est pas un traite entre parties independantes ; c'est l'ensemble des unites d'une seule organisation, composees a travers les portees."
