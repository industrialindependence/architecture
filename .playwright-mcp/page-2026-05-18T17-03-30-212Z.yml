      - paragraph [ref=e108]: § Le fractal
      - paragraph [ref=e109]: Une boite a la tete de chaque zone - la passerelle de bordure securisee. A l'interieur se trouvent les donnees du systeme de controle ; a la boite, elles deviennent de l'information pour les consommateurs. Les dispositifs internes peuvent etre a n'importe quel niveau de securite. La meme unite a chaque zone, quelle que soit l'echelle.
