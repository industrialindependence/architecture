      - paragraph [ref=e109]: § The fractal
      - paragraph [ref=e110]: A box at the head of every zone - the secure edge gateway. Inside is control system data; at the box it becomes information for consumers. Devices inside can be any security level. The same unit at every zone, regardless of scope.
