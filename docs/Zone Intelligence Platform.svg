<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Operations/Enterprise Zone -->
  <rect x="10" y="10" width="880" height="260" fill="#E74C3C" rx="10" opacity="0.8" stroke="#C0392B" stroke-width="3"/>
  <text x="30" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">OPERATIONS / ENTERPRISE ZONE</text>
  
  <!-- Machine Cell / Zone (includes RTA) -->
  <rect x="10" y="290" width="880" height="390" fill="#2C3E50" rx="10" opacity="0.9" stroke="#1A252F" stroke-width="3"/>
  <text x="30" y="315" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">MACHINE CELL / ZONE</text>
  
  <!-- Zone Boundary Conduit with Firewall/Data Diode -->
  <rect x="400" y="265" width="100" height="30" fill="#E67E22" rx="5"/>
  <text x="450" y="283" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">⊲|</text>
  <text x="450" y="260" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">Secure Conduit</text>
  
  <!-- Multiple Outputs in Enterprise Zone -->
  <g id="output-layer">
    <!-- Monitor and Control Plant -->
    <rect x="60" y="80" width="130" height="80" fill="#F1C40F" rx="5"/>
    <text x="125" y="98" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Monitor &amp; Control</text>
    <text x="125" y="115" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">SCADA/MES</text>
    <text x="125" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">HMI/Historian</text>
    <text x="125" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Production Control</text>
    
    <!-- Enterprise Visualization -->
    <rect x="210" y="80" width="130" height="80" fill="#3498DB" rx="5"/>
    <text x="275" y="98" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Enterprise Viz</text>
    <text x="275" y="115" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Grafana</text>
    <text x="275" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">PowerBI</text>
    <text x="275" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Dashboards</text>
    
    <!-- Enterprise Applications -->
    <rect x="360" y="80" width="130" height="80" fill="#F1C40F" rx="5"/>
    <text x="425" y="98" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Enterprise Apps</text>
    <text x="425" y="115" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">ERP/MRP</text>
    <text x="425" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Quality Systems</text>
    <text x="425" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Analytics</text>
    
    <!-- ML Training Dataset -->
    <rect x="510" y="70" width="200" height="100" fill="#E67E22" rx="5"/>
    <text x="610" y="92" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">ML Training Dataset</text>
    <text x="610" y="110" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Unified Context:</text>
    <text x="610" y="128" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Operational Data</text>
    <text x="610" y="143" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Network Intelligence</text>
    <text x="610" y="158" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Business Context</text>
    
    <!-- AI Systems -->
    <rect x="730" y="80" width="120" height="80" fill="white" rx="5"/>
    <text x="790" y="98" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">AI Systems</text>
    <text x="790" y="115" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">ChatGPT</text>
    <text x="790" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Industrial AI</text>
    <text x="790" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Predictive Analytics</text>
    
    <!-- Cybersecurity and Compliance -->
    <rect x="60" y="180" width="160" height="70" fill="#8E44AD" rx="5"/>
    <text x="140" y="198" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Cybersecurity &amp;</text>
    <text x="140" y="213" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Compliance</text>
    <text x="140" y="230" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">IEC 62443 Reports</text>
    <text x="140" y="243" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Asset Inventory</text>
  </g>
  
  <!-- RTA Layer (inside Machine Cell/Zone) -->
  <rect x="30" y="330" width="840" height="180" fill="#3498DB" rx="10" opacity="0.8"/>
  <text x="50" y="355" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">RTA SEMANTIC TRANSLATION LAYER</text>
  
  <g id="rta-layer">
    <!-- RTA Box -->
    <rect x="380" y="365" width="140" height="35" fill="#34495E" rx="5"/>
    <text x="450" y="388" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">RTA</text>
    
    <!-- Semantic DNS -->
    <rect x="60" y="410" width="160" height="80" fill="white" rx="5"/>
    <text x="140" y="428" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Semantic DNS</text>
    <text x="140" y="445" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">192.168.1.47 →</text>
    <text x="140" y="460" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#27AE60">Cell3.Conveyor.DriveVFD</text>
    <text x="140" y="478" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7F8C8D">+ Context Metadata</text>
    
    <!-- Protocol Intelligence -->
    <rect x="240" y="410" width="160" height="80" fill="white" rx="5"/>
    <text x="320" y="428" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Protocol Intelligence</text>
    <text x="320" y="445" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">30+ Years Expertise:</text>
    <text x="320" y="460" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">• Device Recognition</text>
    <text x="320" y="475" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">• Behavioral Analysis</text>
    
    <!-- Local Visualization -->
    <rect x="420" y="410" width="160" height="80" fill="white" rx="5"/>
    <text x="500" y="428" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Local Visualization</text>
    <text x="500" y="445" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Cell-Level HMI:</text>
    <text x="500" y="460" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">• Real-time Status</text>
    <text x="500" y="475" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">• Asset Overview</text>
    
    <!-- Time Series Engine -->
    <rect x="600" y="410" width="160" height="80" fill="white" rx="5"/>
    <text x="680" y="428" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Time Series Engine</text>
    <text x="680" y="445" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Network Intelligence:</text>
    <text x="680" y="460" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">• Historical Patterns</text>
    <text x="680" y="475" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">• Anomaly Detection</text>
  </g>
  
  <!-- Pools of Network Data -->
  <g id="network-data-pools">
    <text x="50" y="545" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Pools of Network Data</text>
    
    <!-- PLC Data -->
    <ellipse cx="120" cy="600" rx="70" ry="25" fill="#16A085" opacity="0.8"/>
    <text x="120" y="597" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">PLC Data</text>
    <text x="120" y="609" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">RA/S7/Modbus</text>
    
    <!-- Ethernet Net Dev Data -->
    <ellipse cx="250" cy="600" rx="70" ry="25" fill="#16A085" opacity="0.8"/>
    <text x="250" y="597" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Ethernet Dev Data</text>
    <text x="250" y="609" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">EIP/PN/MBT</text>
    
    <!-- Other Device Data -->
    <ellipse cx="380" cy="600" rx="70" ry="25" fill="#16A085" opacity="0.8"/>
    <text x="380" y="597" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Other Device Data</text>
    <text x="380" y="609" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">Chillers/UPS/Other</text>
    
    <!-- Other Network Data -->
    <ellipse cx="510" cy="600" rx="70" ry="25" fill="#16A085" opacity="0.8"/>
    <text x="510" y="597" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Other Net Data</text>
    <text x="510" y="609" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">Serial/ASCII/DH+</text>
    
    <!-- SPY Data -->
    <ellipse cx="640" cy="600" rx="70" ry="25" fill="#16A085" opacity="0.8"/>
    <text x="640" y="597" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">SPY Data</text>
    <text x="640" y="609" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">Wireshark++</text>
    
    <!-- Network Infrastructure -->
    <ellipse cx="770" cy="600" rx="70" ry="25" fill="#16A085" opacity="0.8"/>
    <text x="770" y="597" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Network Infra</text>
    <text x="770" y="609" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">Switch/Config</text>
    
    <!-- Bottom row -->
    <ellipse cx="250" cy="645" rx="80" ry="20" fill="#16A085" opacity="0.8"/>
    <text x="250" y="648" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">Network Messages</text>
    
    <ellipse cx="400" cy="645" rx="80" ry="20" fill="#16A085" opacity="0.8"/>
    <text x="400" y="648" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">Operations Data</text>
    
    <ellipse cx="550" cy="645" rx="80" ry="20" fill="#16A085" opacity="0.8"/>
    <text x="550" y="648" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">Switch Data</text>
  </g>
  
  <!-- Data Flow Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E67E22" />
    </marker>
  </defs>
  
  <!-- Flow from RTA to Conduit -->
  <line x1="450" y1="330" x2="450" y2="295" stroke="#E67E22" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Key Differentiator -->
  <rect x="280" y="190" width="340" height="60" fill="#2ECC71" rx="5" opacity="0.95"/>
  <text x="450" y="208" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">KEY DIFFERENTIATOR:</text>
  <text x="450" y="223" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">RTA operates as a boundary device within the protected zone,</text>
  <text x="450" y="238" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">providing semantic context required for AI/ML &amp; Compliance</text>
</svg>